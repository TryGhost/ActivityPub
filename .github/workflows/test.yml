name: Test

on:
  workflow_call:
    inputs:
      skip-tests:
        description: Skip tests
        required: false
        type: boolean
        default: false

jobs:
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Enable Corepack
        run: corepack enable

      - name: Download ActivityPub image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: activitypub-amd64
          path: /tmp

      - name: Download Migrations image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: activitypub-migrations-amd64
          path: /tmp

      - name: Load Docker images
        run: |
          docker load < /tmp/activitypub-amd64.tar
          docker load < /tmp/activitypub-migrations-amd64.tar

      - name: Run Tests
        run: docker compose run --rm migrate-testing up && pnpm test:all

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Enable Corepack
        run: corepack enable

      - name: Download ActivityPub image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: activitypub-amd64
          path: /tmp

      - name: Download Migrations image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: activitypub-migrations-amd64
          path: /tmp

      - name: Load Docker images
        run: |
          docker load < /tmp/activitypub-amd64.tar
          docker load < /tmp/activitypub-migrations-amd64.tar

      - name: Run E2E Tests
        run: pnpm test:cucumber
