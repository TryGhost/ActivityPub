name: Push

on:
  workflow_call:
    inputs:
      activitypub-private-tags:
        description: ActivityPub Docker image tags for private registry
        required: true
        type: string
      activitypub-public-tags:
        description: ActivityPub Docker image tags for public registry
        required: false
        type: string
      activitypub-public-labels:
        description: ActivityPub Docker image labels for public registry
        required: false
        type: string
      activitypub-migrations-private-tags:
        description: ActivityPub Migrations Docker image tags for private registry
        required: true
        type: string
      activitypub-migrations-public-tags:
        description: ActivityPub Migrations Docker image tags for public registry
        required: false
        type: string
      activitypub-migrations-public-labels:
        description: ActivityPub Migrations Docker image tags for public registry
        required: false
        type: string

permissions:
  id-token: write
  packages: write

jobs:
  push-main-images:
    name: Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Download ActivityPub image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: activitypub-amd64
          path: /tmp

      - name: Download Migrations image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: activitypub-migrations-amd64
          path: /tmp

      - name: Download arm64 GHCR digests
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: arm64-ghcr-digests
          path: /tmp/digests

      - name: Authenticate with GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        id: gcp-auth
        with:
          token_format: access_token
          workload_identity_provider: projects/687476608778/locations/global/workloadIdentityPools/github-oidc-activitypub/providers/github-provider-activitypub
          service_account: cicd-activitypub-terraform@ghost-activitypub.iam.gserviceaccount.com

      - name: Login to GCP Artifact Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: europe-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Push ActivityPub Docker image to private registry
        run: |
          docker load < /tmp/activitypub-amd64.tar
          echo "${{ inputs.activitypub-private-tags }}" | while read -r tag; do
            docker push $tag
          done

      - name: Push ActivityPub multi-arch image and manifest to public registry
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          PRIVATE_TAGS: ${{ inputs.activitypub-private-tags }}
          PUBLIC_TAGS: ${{ inputs.activitypub-public-tags }}
          PUBLIC_LABELS: ${{ inputs.activitypub-public-labels }}
        run: |
          source_private=$(printf '%s\n' "$PRIVATE_TAGS" | awk 'NF { print; exit }')
          [ -n "$source_private" ] || { echo "no source tag"; exit 1; }

          amd64_digest=""
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag "$source_private" "$tag"
            push_output=$(docker push "$tag")
            echo "$push_output"
            d=$(echo "$push_output" | grep -oE 'digest: sha256:[a-f0-9]+' | awk '{print $2}' | tail -1)
            [ -n "$d" ] && amd64_digest="$d"
          done <<< "$PUBLIC_TAGS"
          [ -n "$amd64_digest" ] || { echo "failed to capture amd64 digest"; exit 1; }

          arm64_digest=$(cat /tmp/digests/activitypub-arm64.digest)
          [ -n "$arm64_digest" ] || { echo "missing arm64 digest"; exit 1; }

          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tag_args+=(-t "$tag")
          done <<< "$PUBLIC_TAGS"

          annotation_args=()
          while IFS= read -r label; do
            [ -n "$label" ] || continue
            annotation_args+=(--annotation "index:$label")
          done <<< "$PUBLIC_LABELS"

          docker buildx imagetools create "${tag_args[@]}" "${annotation_args[@]}" \
            "ghcr.io/tryghost/activitypub@${amd64_digest}" \
            "ghcr.io/tryghost/activitypub@${arm64_digest}"

      - name: Push Migrations Docker image to private registry
        run: |
          docker load < /tmp/activitypub-migrations-amd64.tar
          echo "${{ inputs.activitypub-migrations-private-tags }}" | while read -r tag; do
            docker push $tag
          done

      - name: Push Migrations multi-arch image and manifest to public registry
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          PRIVATE_TAGS: ${{ inputs.activitypub-migrations-private-tags }}
          PUBLIC_TAGS: ${{ inputs.activitypub-migrations-public-tags }}
          PUBLIC_LABELS: ${{ inputs.activitypub-migrations-public-labels }}
        run: |
          source_private=$(printf '%s\n' "$PRIVATE_TAGS" | awk 'NF { print; exit }')
          [ -n "$source_private" ] || { echo "no source tag"; exit 1; }

          amd64_digest=""
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag "$source_private" "$tag"
            push_output=$(docker push "$tag")
            echo "$push_output"
            d=$(echo "$push_output" | grep -oE 'digest: sha256:[a-f0-9]+' | awk '{print $2}' | tail -1)
            [ -n "$d" ] && amd64_digest="$d"
          done <<< "$PUBLIC_TAGS"
          [ -n "$amd64_digest" ] || { echo "failed to capture amd64 digest"; exit 1; }

          arm64_digest=$(cat /tmp/digests/activitypub-migrations-arm64.digest)
          [ -n "$arm64_digest" ] || { echo "missing arm64 digest"; exit 1; }

          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tag_args+=(-t "$tag")
          done <<< "$PUBLIC_TAGS"

          annotation_args=()
          while IFS= read -r label; do
            [ -n "$label" ] || continue
            annotation_args+=(--annotation "index:$label")
          done <<< "$PUBLIC_LABELS"

          docker buildx imagetools create "${tag_args[@]}" "${annotation_args[@]}" \
            "ghcr.io/tryghost/activitypub-migrations@${amd64_digest}" \
            "ghcr.io/tryghost/activitypub-migrations@${arm64_digest}"
